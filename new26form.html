<!DOCTYPE html>
<html lang="en">
<head>

  <title>MB DanceCuts Inquiries</title>

  <style>
    :root {
      --page-bg: #e9e9e9;
      --text: #000000;
      --border: #d4d4d8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--page-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ===== TOP BAR (UNCHANGED) ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .topbar-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .brand,
    .menu-link {
      font-family: Arial Black, Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: #000;
      line-height: 1;
    }

    .brand {
      font-size: 1.15rem;
      margin-right: 8px;
      white-space: nowrap;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .menu-link {
      font-size: 0.88rem;
      opacity: 0.8;
      transition: opacity 0.15s ease;
    }

    .menu-link:hover,
    .menu-link.active {
      opacity: 1;
    }

    /* ===== PAGE CONTENT ===== */
    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .headline {
      font-family: Arial Black, Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.95;
      font-size: clamp(3rem, 6vw, 5rem);
      margin-bottom: 30px;
    }

    .copy {
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .copy a {
      color: inherit;
      text-decoration: none;
      border-bottom: 2px solid #000;
    }

    .divider {
      margin: 18px 0;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    @media (max-width: 720px) {
      .page-wrap {
        padding: 40px 16px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">

        <a href="new26form.html" class="menu-link active">Inquiries</a>

    </div>
  </header>

  <main class="page-wrap">
