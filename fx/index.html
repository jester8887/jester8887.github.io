<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Workshop Demo</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --text: #eef2f7;
      --muted: #a9b3c3;
      --accent: #63b3ff;
      --border: #2a3140;
      --success: #4ade80;
      --warn: #facc15;
      --danger: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0d1016, #121723);
      color: var(--text);
    }

    header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 21, 0.95);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    header h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
    }

    header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .transport-bar {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .transport-left {
      display: grid;
      gap: 10px;
    }

    .transport-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(90px, 120px));
      gap: 10px;
      align-items: center;
    }

    .transport-right {
      display: grid;
      gap: 10px;
      min-width: 260px;
    }

    .status-block {
      display: grid;
      gap: 8px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .active-source {
      font-size: 13px;
      color: var(--text);
      min-height: 18px;
    }

    .meter {
      height: 10px;
      width: 100%;
      background: #0f1115;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--success), var(--warn), var(--danger));
      transition: width 0.08s linear;
    }

    .loop-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      height: 42px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .source-actions {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .row {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input[type="text"],
    select,
    input[type="file"],
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }

    input[type="checkbox"] {
      accent-color: var(--accent);
    }

    button {
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .library {
      max-height: 540px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .effects-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .effects-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 16px;
    }

    .effect-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Audio Workshop Demo</h1>
    <p>Choose a built-in source or upload your own file, then experiment with effect settings in real time.</p>

    <div class="transport-bar">
      <div class="transport-left">
        <div class="transport-buttons">
          <button id="playBtn" type="button">Play</button>
          <button id="pauseBtn" type="button">Pause</button>
          <button id="stopBtn" type="button">Stop</button>
          <button id="resetBtn" type="button">Reset FX</button>
        </div>

        <div id="masterOutputHost" class="transport-master-host"></div>
      </div>

      <div class="transport-right">
        <label class="loop-wrap">
          <input type="checkbox" id="loopToggle" />
          <span>Loop playback</span>
        </label>

        <div class="status-block">
          <div class="active-source" id="activeSourceText">Active source: none loaded</div>
          <div class="status" id="statusText">Loading source library...</div>
          <div class="meter">
            <div class="meter-fill" id="meterFill"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Source</h2>

      <div class="source-actions">
        <div class="row">
          <label for="categoryFilter">Filter by category</label>
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
        </div>

        <div class="row">
          <label for="searchInput">Search library</label>
          <input type="text" id="searchInput" placeholder="Type part of a source name..." />
        </div>

        <div class="row">
          <label for="uploadInput">Upload your own audio file</label>
          <input type="file" id="uploadInput" accept="audio/*" />
        </div>
      </div>

      <div class="library" id="libraryList"></div>
    </section>

    <section>
      <div class="effects-header">
        <h2>Effects</h2>
      </div>

      <div id="effectsContainer" class="effects-grid">
        <div class="module-placeholder">
          Effect modules have not loaded yet.
        </div>
      </div>
    </section>
  </main>

  <script src="js/app-state.js"></script>
  <script src="js/dom-elements.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/module-registry.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/library-manager.js"></script>
  <script src="js/upload-manager.js"></script>
  <script src="js/transport-controls.js"></script>
  <script src="js/meter.js"></script>
  <script src="js/reset-fx.js"></script>

  <script src="js/modules/master-module.js"></script>
  <script src="js/modules/lowpass-module.js"></script>
  <script src="js/modules/highpass-module.js"></script>
  <script src="js/modules/bandpass-module.js"></script>
  <script src="js/modules/notch-module.js"></script>
  <script src="js/modules/lowshelf-module.js"></script>
  <script src="js/modules/highshelf-module.js"></script>
  <script src="js/modules/compressor-module.js"></script>
  <script src="js/modules/distortion-module.js"></script>
  <script src="js/modules/delay-module.js"></script>
  <script src="js/modules/reverb-module.js"></script>
  <script src="js/modules/tremolo-module.js"></script>
  <script src="js/modules/vibrato-module.js"></script>
  <script src="js/modules/chorus-module.js"></script>
  <script src="js/modules/flanger-module.js"></script>
  <script src="js/modules/noise-gate-module.js"></script>

  <script src="js/main.js"></script>
</body>
</html>
