<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mix-O-Rama</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1a1a1a;
      --card: #222;
      --border: #333;
      --border-soft: #444;
      --text: #eee;
      --muted: #bbb;
      --accent: #9fd3ff;
      --button: #3a3a3a;
      --button-hover: #555;
      --timeline-height: 128px;
      --timeline-track-height: 100px;
      --playhead-width: 3px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1b1b1b;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }

    header p {
      margin: 0;
      color: var(--muted);
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 500px;
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 1.3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .panel-mix {
      order: 2;
    }

    .panel-library {
      order: 1;
    }

    .search-box {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid var(--border-soft);
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    .search-meta {
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 14px;
      min-height: 1.2em;
    }

    .clip-list,
    .mix-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 65vh;
      overflow-y: auto;
    }

    .clip-card,
    .mix-card {
      background: var(--card);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 12px;
    }

    .clip-title,
    .mix-title {
      font-weight: bold;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .clip-meta,
    .mix-meta {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      background: var(--button);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .main-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    .mix-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .timeline-wrap {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #141414;
    }

    .timeline-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .timeline-title {
      font-weight: bold;
      font-size: 1rem;
    }

    .timeline-note {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .timeline-shell {
      position: relative;
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      background: #0d0d0d;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 12px 12px 10px 12px;
      cursor: pointer;
      scrollbar-width: thin;
    }

    .timeline-shell.empty {
      cursor: default;
    }

    .timeline-inner {
      position: relative;
      height: var(--timeline-height);
      min-width: 100%;
    }

    .timeline-track {
      position: absolute;
      top: 14px;
      left: 0;
      height: var(--timeline-track-height);
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    .mix-visual-empty {
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .mix-block {
      position: relative;
      flex: 0 0 auto;
      height: 100%;
      background: #e8e8e8;
      border: 2px solid #111;
      color: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px 8px;
      text-align: center;
      overflow: hidden;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .mix-block + .mix-block {
      margin-left: 6px;
    }

    .mix-block.active {
      background: #cfe9ff;
    }

    .mix-block-number {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 0.72rem;
      font-weight: bold;
      opacity: 0.7;
    }

    .mix-block-title {
      font-weight: bold;
      line-height: 1.02;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-word;
      max-width: 100%;
    }

    .mix-block-time {
      margin-top: 6px;
      font-size: 0.95rem;
      line-height: 1.1;
      white-space: nowrap;
    }

    .mix-block-artist {
      margin-top: 5px;
      font-size: 0.72rem;
      line-height: 1.1;
      opacity: 0.72;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 100%;
    }

    .playhead {
      position: absolute;
      top: 6px;
      bottom: 18px;
      width: var(--playhead-width);
      background: var(--accent);
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 0 1px rgba(159, 211, 255, 0.5);
      transform: translateX(-50%);
      display: none;
    }

    .playhead::before {
      content: "";
      position: absolute;
      top: -7px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .timeline-ticks {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 18px;
      pointer-events: none;
    }

    .timeline-tick {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #888;
      white-space: nowrap;
    }

    .mix-card.playing {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(159, 211, 255, 0.4);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      box-sizing: border-box;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      background: #101010;
      color: var(--text);
      padding: 12px;
      font-family: Arial, sans-serif;
      resize: vertical;
    }

    .status {
      margin-top: 10px;
      color: var(--accent);
      font-size: 0.95rem;
      min-height: 1.2em;
    }

    audio {
      width: 100%;
      margin-top: 8px;
    }

    .small-note {
      margin-top: 8px;
      color: #888;
      font-size: 0.8rem;
      line-height: 1.3;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .panel-mix {
        order: 1;
      }

      .panel-library {
        order: 2;
      }

      .clip-list,
      .mix-list {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mix-O-Rama</h1>
    <p>Build a rough mix from hosted clip samples</p>
  </header>

  <div class="container">
    <section class="panel panel-library">
      <h2>Clip Library</h2>
      <input
        id="searchInput"
        class="search-box"
        type="text"
        placeholder="Search by artist or title..."
        autocomplete="off"
      />
      <div id="searchMeta" class="search-meta"></div>
      <div id="clipList" class="clip-list"></div>
    </section>

    <section class="panel panel-mix">
      <h2>Your Rough Mix</h2>

      <div class="main-controls">
        <button id="playMixBtn">Play Rough Mix</button>
        <button id="stopMixBtn">Stop</button>
        <button id="clearMixBtn">Clear All</button>
        <button id="copyListBtn">Copy List</button>
      </div>

      <div class="mix-summary">
        <div><strong>Clips:</strong> <span id="clipCount">0</span></div>
        <div><strong>Total Time:</strong> <span id="totalTime">0:00</span></div>
      </div>

      <div class="timeline-wrap">
        <div class="timeline-top">
          <div class="timeline-title">Mix Shape</div>
          <div class="timeline-note">Click or drag the vertical line to seek</div>
        </div>

        <div id="timelineShell" class="timeline-shell empty">
          <div id="mixVisualEmpty" class="mix-visual-empty">No clips selected yet.</div>
          <div id="timelineInner" class="timeline-inner" style="display:none;">
            <div id="timelineTrack" class="timeline-track"></div>
            <div id="playhead" class="playhead"></div>
            <div id="timelineTicks" class="timeline-ticks"></div>
          </div>
        </div>
      </div>

      <div id="mixList" class="mix-list"></div>
      <div id="status" class="status"></div>
      <textarea id="mixOutput" readonly placeholder="Your selected clip list will appear here..."></textarea>
      <div class="small-note">Download controls are hidden where possible, but determined users can still access streamed audio.</div>
    </section>
  </div>

  <script>
    const clipListEl = document.getElementById("clipList");
    const mixListEl = document.getElementById("mixList");
    const mixOutputEl = document.getElementById("mixOutput");
    const searchInputEl = document.getElementById("searchInput");
    const searchMetaEl = document.getElementById("searchMeta");
    const statusEl = document.getElementById("status");
    const clipCountEl = document.getElementById("clipCount");
    const totalTimeEl = document.getElementById("totalTime");

    const timelineShellEl = document.getElementById("timelineShell");
    const timelineInnerEl = document.getElementById("timelineInner");
    const timelineTrackEl = document.getElementById("timelineTrack");
    const timelineTicksEl = document.getElementById("timelineTicks");
    const playheadEl = document.getElementById("playhead");
    const mixVisualEmptyEl = document.getElementById("mixVisualEmpty");

    const playMixBtn = document.getElementById("playMixBtn");
    const stopMixBtn = document.getElementById("stopMixBtn");
    const clearMixBtn = document.getElementById("clearMixBtn");
    const copyListBtn = document.getElementById("copyListBtn");

    let allClips = [];
    let filteredClips = [];
    let roughMix = [];
    let currentAudio = null;
    let currentMixIndex = -1;
    let isPlayingMix = false;
    let trackStartTime = 0;
    let animationFrameId = null;
    let isDraggingPlayhead = false;

    async function loadClips() {
      try {
        const response = await fetch("json/mixclips.json");
        if (!response.ok) throw new Error("Could not load mixclips.json");
        allClips = await response.json();
        filteredClips = [...allClips];
        renderClipLibrary();
        updateSearchMeta();
      } catch (error) {
        clipListEl.innerHTML = `<div class="clip-card">Error loading clips: ${error.message}</div>`;
      }
    }

    function clipDisplayName(clip) {
      return `${clip.artist} [${clip.title}]`;
    }

    function parseLengthToSeconds(length) {
      if (!length) return 0;
      const str = String(length).trim().toLowerCase();

      let m = str.match(/^(\d+)m(\d{1,2})s$/);
      if (m) return Number(m[1]) * 60 + Number(m[2]);

      m = str.match(/^(\d+)s$/);
      if (m) return Number(m[1]);

      return 0;
    }

    function formatSeconds(seconds) {
      const safe = Math.max(0, Math.round(seconds || 0));
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function titleFontSizeForBlock(title, widthPx) {
      const len = (title || "").length;
      if (widthPx < 90 || len > 28) return "0.78rem";
      if (widthPx < 120 || len > 20) return "0.88rem";
      if (widthPx < 170 || len > 14) return "0.98rem";
      return "1.08rem";
    }

    function getTotalMixSeconds() {
      return roughMix.reduce((sum, clip) => sum + parseLengthToSeconds(clip.length), 0);
    }

    function getTimelineWidth(totalSeconds) {
      const secondsPerPixel = 0.6;
      const fittedWidth = Math.max(640, Math.round(totalSeconds / secondsPerPixel));
      const shellWidth = timelineShellEl.clientWidth ? timelineShellEl.clientWidth - 24 : 640;
      const shouldScroll = totalSeconds >= 240 || fittedWidth > shellWidth;
      return shouldScroll ? fittedWidth : shellWidth;
    }

    function shouldScrollTimeline(totalSeconds) {
      const width = getTimelineWidth(totalSeconds);
      const shellWidth = timelineShellEl.clientWidth ? timelineShellEl.clientWidth - 24 : 640;
      return totalSeconds >= 240 || width > shellWidth;
    }

    function getClipRanges() {
      let elapsed = 0;
      return roughMix.map((clip, index) => {
        const seconds = parseLengthToSeconds(clip.length);
        const start = elapsed;
        const end = elapsed + seconds;
        elapsed = end;
        return { clip, index, start, end, seconds };
      });
    }

    function getCurrentGlobalTime() {
      if (!currentAudio || currentMixIndex < 0 || currentMixIndex >= roughMix.length) return 0;
      return trackStartTime + (currentAudio.currentTime || 0);
    }

    function updateSearchMeta() {
      const q = searchInputEl.value.trim();
      if (!allClips.length) {
        searchMetaEl.textContent = "";
        return;
      }

      if (!q) {
        searchMetaEl.textContent = `${allClips.length} clips available`;
        return;
      }

      searchMetaEl.textContent = `${filteredClips.length} result${filteredClips.length === 1 ? "" : "s"} for "${q}"`;
    }

    function cancelPlayheadLoop() {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
    }

    function stopCurrentPlayback() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio.onended = null;
      }
      currentAudio = null;
      isPlayingMix = false;
      currentMixIndex = -1;
      trackStartTime = 0;
      cancelPlayheadLoop();
      highlightCurrentMixCard(-1);
      highlightCurrentMixBlock(-1);
      updatePlayhead(0);
    }

    function highlightCurrentMixCard(index) {
      document.querySelectorAll(".mix-card").forEach((card, i) => {
        card.classList.toggle("playing", i === index);
      });
    }

    function highlightCurrentMixBlock(index) {
      document.querySelectorAll(".mix-block").forEach((block, i) => {
        block.classList.toggle("active", i === index);
      });
    }

    function updatePlayhead(globalSeconds) {
      const total = getTotalMixSeconds();
      if (!total || timelineInnerEl.style.display === "none") {
        playheadEl.style.display = "none";
        return;
      }

      const trackWidth = timelineTrackEl.offsetWidth;
      const clamped = Math.max(0, Math.min(globalSeconds, total));
      const x = (clamped / total) * trackWidth;

      playheadEl.style.display = "block";
      playheadEl.style.left = `${x}px`;

      if (!isDraggingPlayhead && isPlayingMix) {
        const shellScrollLeft = timelineShellEl.scrollLeft;
        const visibleLeft = shellScrollLeft;
        const visibleRight = shellScrollLeft + timelineShellEl.clientWidth;
        const desiredLeft = x - 80;
        const desiredRight = x + 80;

        if (desiredLeft < visibleLeft) {
          timelineShellEl.scrollLeft = Math.max(0, x - timelineShellEl.clientWidth * 0.25);
        } else if (desiredRight > visibleRight) {
          timelineShellEl.scrollLeft = Math.max(0, x - timelineShellEl.clientWidth * 0.75);
        }
      }
    }

    function runPlayheadLoop() {
      cancelPlayheadLoop();

      const loop = () => {
        if (isPlayingMix && currentAudio) {
          updatePlayhead(getCurrentGlobalTime());
          animationFrameId = requestAnimationFrame(loop);
        }
      };

      animationFrameId = requestAnimationFrame(loop);
    }

    function renderTimelineTicks(totalSeconds, trackWidth) {
      timelineTicksEl.innerHTML = "";
      if (!totalSeconds) return;

      let interval = 30;
      if (totalSeconds > 300) interval = 60;
      if (totalSeconds > 600) interval = 120;

      for (let t = 0; t <= totalSeconds; t += interval) {
        const tick = document.createElement("div");
        tick.className = "timeline-tick";
        tick.style.left = `${(t / totalSeconds) * trackWidth}px`;
        tick.textContent = formatSeconds(t);
        timelineTicksEl.appendChild(tick);
      }

      if (totalSeconds % interval !== 0) {
        const tick = document.createElement("div");
        tick.className = "timeline-tick";
        tick.style.left = `${trackWidth}px`;
        tick.textContent = formatSeconds(totalSeconds);
        timelineTicksEl.appendChild(tick);
      }
    }

    function seekToGlobalTime(globalSeconds) {
      const ranges = getClipRanges();
      if (!ranges.length) return;

      const total = getTotalMixSeconds();
      const clamped = Math.max(0, Math.min(globalSeconds, total));

      let targetRange = ranges[ranges.length - 1];
      for (const range of ranges) {
        if (clamped >= range.start && clamped < range.end) {
          targetRange = range;
          break;
        }
      }

      const offset = Math.max(0, clamped - targetRange.start);

      if (isPlayingMix) {
        playMixAtIndex(targetRange.index, offset);
      } else {
        currentMixIndex = targetRange.index;
        trackStartTime = targetRange.start;
        highlightCurrentMixCard(targetRange.index);
        highlightCurrentMixBlock(targetRange.index);
        updatePlayhead(clamped);
        statusEl.textContent = `Seek preview: ${targetRange.index + 1}. ${clipDisplayName(targetRange.clip)} at ${formatSeconds(clamped)}`;
      }
    }

    function timelineEventToSeconds(clientX) {
      const total = getTotalMixSeconds();
      const rect = timelineTrackEl.getBoundingClientRect();
      const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
      return (x / rect.width) * total;
    }

    function renderClipLibrary() {
      clipListEl.innerHTML = "";

      if (!filteredClips.length) {
        clipListEl.innerHTML = `<div class="clip-card">No clips found.</div>`;
        return;
      }

      filteredClips.forEach((clip, index) => {
        const card = document.createElement("div");
        card.className = "clip-card";

        card.innerHTML = `
          <div class="clip-title">${clip.title || "Untitled"}</div>
          <div class="clip-meta">${clip.artist || "Unknown Artist"}${clip.length ? " • " + clip.length : ""}${clip.bpm ? " • " + clip.bpm + " BPM" : ""}</div>
          <div class="button-row">
            <button data-index="${index}" class="preview-btn">Preview</button>
            <button data-index="${index}" class="add-btn">Add to Mix</button>
          </div>
          <audio
            controls
            preload="none"
            controlsList="nodownload noplaybackrate"
            oncontextmenu="return false;"
            src="${clip.audio}"
          ></audio>
        `;

        clipListEl.appendChild(card);
      });

      document.querySelectorAll(".add-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const clip = filteredClips[Number(btn.dataset.index)];
          roughMix.push(clip);
          renderRoughMix();
          statusEl.textContent = `Added: ${clipDisplayName(clip)}`;
        });
      });

      document.querySelectorAll(".preview-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const clip = filteredClips[Number(btn.dataset.index)];
          if (currentAudio) {
            stopCurrentPlayback();
          }
          currentAudio = new Audio(clip.audio);
          currentAudio.play();
          statusEl.textContent = `Previewing: ${clipDisplayName(clip)}`;
        });
      });

      document.querySelectorAll("audio").forEach(audio => {
        audio.addEventListener("play", () => {
          document.querySelectorAll("audio").forEach(other => {
            if (other !== audio) other.pause();
          });
        });
      });
    }

    function renderMixVisual() {
      if (!roughMix.length) {
        timelineShellEl.classList.add("empty");
        mixVisualEmptyEl.style.display = "flex";
        timelineInnerEl.style.display = "none";
        timelineTrackEl.innerHTML = "";
        timelineTicksEl.innerHTML = "";
        playheadEl.style.display = "none";
        return;
      }

      timelineShellEl.classList.remove("empty");
      mixVisualEmptyEl.style.display = "none";
      timelineInnerEl.style.display = "block";
      timelineTrackEl.innerHTML = "";

      const ranges = getClipRanges();
      const total = getTotalMixSeconds();
      const timelineWidth = getTimelineWidth(total);
      timelineInnerEl.style.width = `${timelineWidth}px`;
      timelineTrackEl.style.width = `${timelineWidth}px`;

      ranges.forEach(({ clip, index, seconds }) => {
        const width = Math.max(72, Math.round((seconds / total) * timelineWidth));

        const block = document.createElement("div");
        block.className = "mix-block";
        block.dataset.index = index;
        block.style.width = `${width}px`;
        block.title = `${index + 1}. ${clip.title || ""} — ${clip.artist || ""} (${clip.length || ""})`;

        const title = document.createElement("div");
        title.className = "mix-block-title";
        title.textContent = clip.title || "Untitled";
        title.style.fontSize = titleFontSizeForBlock(clip.title || "", width);

        const time = document.createElement("div");
        time.className = "mix-block-time";
        time.textContent = clip.length || "";

        const artist = document.createElement("div");
        artist.className = "mix-block-artist";
        artist.textContent = clip.artist || "";

        const number = document.createElement("div");
        number.className = "mix-block-number";
        number.textContent = index + 1;

        block.append(number, title, time, artist);

        block.addEventListener("click", (e) => {
          e.stopPropagation();
          const target = document.querySelector(`.mix-card[data-index="${index}"]`);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });

        timelineTrackEl.appendChild(block);
      });

      renderTimelineTicks(total, timelineWidth);
      updatePlayhead(getCurrentGlobalTime());
      highlightCurrentMixBlock(currentMixIndex);

      if (!shouldScrollTimeline(total)) {
        timelineShellEl.scrollLeft = 0;
      }
    }

    function renderRoughMix() {
      mixListEl.innerHTML = "";

      clipCountEl.textContent = roughMix.length;
      totalTimeEl.textContent = formatSeconds(getTotalMixSeconds());

      renderMixVisual();

      if (!roughMix.length) {
        mixListEl.innerHTML = `<div class="mix-card">No clips selected yet.</div>`;
        mixOutputEl.value = "";
        playMixBtn.disabled = true;
        stopMixBtn.disabled = true;
        clearMixBtn.disabled = true;
        copyListBtn.disabled = true;
        return;
      }

      playMixBtn.disabled = false;
      stopMixBtn.disabled = false;
      clearMixBtn.disabled = false;
      copyListBtn.disabled = false;

      roughMix.forEach((clip, index) => {
        const card = document.createElement("div");
        card.className = "mix-card";
        card.dataset.index = index;

        card.innerHTML = `
          <div class="mix-title">${index + 1}. ${clip.title || "Untitled"}</div>
          <div class="mix-meta">${clip.artist || "Unknown Artist"}${clip.length ? " • " + clip.length : ""}</div>
          <div class="button-row">
            <button data-index="${index}" class="up-btn">Up</button>
            <button data-index="${index}" class="down-btn">Down</button>
            <button data-index="${index}" class="remove-btn">Remove</button>
          </div>
        `;

        mixListEl.appendChild(card);
      });

      document.querySelectorAll(".up-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.index);
          if (i > 0) {
            [roughMix[i - 1], roughMix[i]] = [roughMix[i], roughMix[i - 1]];
            if (currentMixIndex === i) currentMixIndex = i - 1;
            else if (currentMixIndex === i - 1) currentMixIndex = i;
            renderRoughMix();
          }
        });
      });

      document.querySelectorAll(".down-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.index);
          if (i < roughMix.length - 1) {
            [roughMix[i + 1], roughMix[i]] = [roughMix[i], roughMix[i + 1]];
            if (currentMixIndex === i) currentMixIndex = i + 1;
            else if (currentMixIndex === i + 1) currentMixIndex = i;
            renderRoughMix();
          }
        });
      });

      document.querySelectorAll(".remove-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.index);

          if (i === currentMixIndex) {
            stopCurrentPlayback();
            statusEl.textContent = "Removed currently playing clip.";
          } else if (i < currentMixIndex) {
            currentMixIndex -= 1;
          }

          roughMix.splice(i, 1);
          renderRoughMix();
        });
      });

      updateMixOutput();
      highlightCurrentMixCard(currentMixIndex);
    }

    function updateMixOutput() {
      const lines = roughMix.map((clip, i) => {
        return `${i + 1}. ${clip.artist || "Unknown Artist"} [${clip.title || "Untitled"}] (${clip.length || ""})`;
      });
      mixOutputEl.value = lines.join("\n");
    }

    function playMixAtIndex(index, startOffset = 0) {
      if (!isPlayingMix) return;

      if (index >= roughMix.length) {
        statusEl.textContent = "Finished rough mix playback.";
        stopCurrentPlayback();
        return;
      }

      currentMixIndex = index;
      const clip = roughMix[index];
      const ranges = getClipRanges();
      const range = ranges[index];
      trackStartTime = range ? range.start : 0;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio.onended = null;
      }

      currentAudio = new Audio(clip.audio);
      isPlayingMix = true;

      highlightCurrentMixCard(index);
      highlightCurrentMixBlock(index);

      currentAudio.onloadedmetadata = () => {
        if (startOffset > 0) {
          currentAudio.currentTime = Math.min(startOffset, currentAudio.duration || startOffset);
        }
        updatePlayhead(getCurrentGlobalTime());
      };

      statusEl.textContent = `Playing ${index + 1} of ${roughMix.length}: ${clipDisplayName(clip)}`;

      currentAudio.onended = () => {
        playMixAtIndex(index + 1, 0);
      };

      currentAudio.play().then(() => {
        runPlayheadLoop();
      }).catch(err => {
        statusEl.textContent = `Playback error: ${err.message}`;
        stopCurrentPlayback();
      });
    }

    searchInputEl.addEventListener("input", () => {
      const q = searchInputEl.value.trim().toLowerCase();

      filteredClips = allClips.filter(clip =>
        (clip.title || "").toLowerCase().includes(q) ||
        (clip.artist || "").toLowerCase().includes(q)
      );

      renderClipLibrary();
      updateSearchMeta();
    });

    playMixBtn.addEventListener("click", () => {
      if (!roughMix.length) {
        statusEl.textContent = "Add some clips first.";
        return;
      }

      isPlayingMix = true;
      const currentGlobal = getCurrentGlobalTime();
      if (currentMixIndex >= 0 && currentGlobal > 0 && currentGlobal < getTotalMixSeconds()) {
        seekToGlobalTime(currentGlobal);
      } else {
        playMixAtIndex(0, 0);
      }
    });

    stopMixBtn.addEventListener("click", () => {
      stopCurrentPlayback();
      statusEl.textContent = "Playback stopped.";
    });

    clearMixBtn.addEventListener("click", () => {
      stopCurrentPlayback();
      roughMix = [];
      renderRoughMix();
      statusEl.textContent = "Rough mix cleared.";
    });

    copyListBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(mixOutputEl.value);
        statusEl.textContent = "Mix list copied to clipboard.";
      } catch {
        statusEl.textContent = "Could not copy list.";
      }
    });

    timelineShellEl.addEventListener("pointerdown", (e) => {
      if (!roughMix.length || timelineInnerEl.style.display === "none") return;
      isDraggingPlayhead = true;
      const seconds = timelineEventToSeconds(e.clientX);
      updatePlayhead(seconds);
      seekToGlobalTime(seconds);
      timelineShellEl.setPointerCapture?.(e.pointerId);
    });

    timelineShellEl.addEventListener("pointermove", (e) => {
      if (!isDraggingPlayhead || !roughMix.length) return;
      const seconds = timelineEventToSeconds(e.clientX);
      updatePlayhead(seconds);
      seekToGlobalTime(seconds);
    });

    function endPlayheadDrag(e) {
      if (!isDraggingPlayhead) return;
      isDraggingPlayhead = false;
      timelineShellEl.releasePointerCapture?.(e.pointerId);
    }

    timelineShellEl.addEventListener("pointerup", endPlayheadDrag);
    timelineShellEl.addEventListener("pointercancel", endPlayheadDrag);
    timelineShellEl.addEventListener("pointerleave", (e) => {
      if (isDraggingPlayhead && e.buttons === 0) endPlayheadDrag(e);
    });

    document.addEventListener("contextmenu", (e) => {
      if (e.target.closest("audio")) {
        e.preventDefault();
      }
    });

    window.addEventListener("resize", () => {
      renderMixVisual();
    });

    loadClips();
    renderRoughMix();
  </script>
</body>
</html>
