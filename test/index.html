<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Private Mix Library</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    const accessParam = params.get("access");
    const destination = "./new26mixes.html";

    if (accessParam === "dance") {
      localStorage.setItem("mb_access", "true");
      window.location.replace(destination);
    }

    if (localStorage.getItem("mb_access") === "true") {
      window.location.replace(destination);
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
      letter-spacing: 0.4px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 14px;
      line-height: 1.5;
      font-size: 15px;
    }

    .actions {
      max-width: 360px;
      margin: 0 auto;
      width: 100%;
    }

    /* PRIMARY BUTTON */
    .cta-primary {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: #f5f5f0;
      color: #000;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 10px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(255,255,255,0.06);
      transition: all 0.15s ease;
    }

    .cta-primary:hover {
      transform: translateY(-1px);
      background: #ffffff;
    }

    /* DIVIDER */
    .divider {
      margin: 18px 0 10px;
      font-size: 11px;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* SUBTLE FORM */
    .subtle-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
      text-align: center;
      background: #1a1a1a;
      color: white;
      outline: none;
      transition: all 0.15s ease;
    }

    .subtle-form input:focus {
      background: #222;
      box-shadow: 0 0 0 1px #666;
    }

    .subtle-form input::placeholder {
      color: #aaa;
    }

    .subtle-form button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #555;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .subtle-form button:hover {
      background: #666;
    }

    .micro-text {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.45;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Private Mix Library</h1>

    <p>
      This collection isn’t publicly listed.
      If you're looking for mixes for your dancers, I’ve got you covered.
    </p>

    <p>
      Message me and I’ll send you access right away.
    </p>

    <div class="actions">
      <a class="cta-primary" href="https://www.facebook.com/marcbeth" target="_blank" rel="noopener noreferrer">
        Message Me on Facebook (Preferred)
      </a>

      <div class="divider">or</div>

      <form action="https://formspree.io/f/mjgjwlnq" method="POST" class="subtle-form">
        <input
          type="email"
          name="email"
          placeholder="Prefer email instead?"
          required
        >

        <input type="hidden" name="source" value="root-index-access-page">

        <button type="submit">Request Access</button>

        <div class="micro-text">No spam. Just access.</div>
      </form>
    </div>
  </div>

  <script>
    window.goatcounter = {
      path: function () {
        return location.pathname;
      }
    };
  </script>

  <script data-goatcounter="https://jester8887.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script>
    document.querySelector('form').addEventListener('submit', function() {
      if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({
          path: 'email_submit',
          event: true
        });
      }
    });
  </script>
</body>
</html>
