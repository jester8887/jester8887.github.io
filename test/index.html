<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Private Mix Library</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    const accessParam = params.get("access");
    const destination = "./new26mixes.html";

    if (accessParam === "dance") {
      localStorage.setItem("mb_access", "true");
      window.location.replace(destination);
    }

    if (localStorage.getItem("mb_access") === "true") {
      window.location.replace(destination);
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* PRIMARY BUTTON */
    .cta-primary {
      display: inline-block;
      width: 100%;
      padding: 14px 20px;
      background: #ffffff;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
    }

    .cta-primary:hover {
      opacity: 0.85;
    }

    /* DIVIDER */
    .divider {
      margin: 18px 0 10px;
      font-size: 12px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* SUBTLE FORM */
    .subtle-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 6px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      opacity: 0.9;
    }

    .subtle-form button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #666;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    .subtle-form button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Private Mix Library</h1>

    <p>
      This collection isn’t publicly listed.
      If you're looking for mixes for your dancers, I’ve got you covered.
    </p>

    <p>
      The fastest way to get access is to message me directly.
    </p>

    <!-- 🔥 PRIMARY CTA -->
    <a class="cta-primary" href="https://www.facebook.com/marcbeth" target="_blank" rel="noopener noreferrer">
      Message Me on Facebook (Preferred)
    </a>

    <!-- 👇 SECONDARY OPTION -->
    <div class="divider">or</div>

    <form action="https://formspree.io/f/mjgjwlnq" method="POST" class="subtle-form">
      <input
        type="email"
        name="email"
        placeholder="Prefer email instead?"
        required
      >

      <input type="hidden" name="source" value="root-index-access-page">

      <button type="submit">Request Access</button>
    </form>
  </div>

  <!-- GoatCounter -->
  <script>
    window.goatcounter = {
      path: function () {
        return location.pathname;
      }
    };
  </script>

  <script data-goatcounter="https://jester8887.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <!-- Track email submissions -->
  <script>
    document.querySelector('form').addEventListener('submit', function() {
      if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({
          path: 'email_submit',
          event: true
        });
      }
    });
  </script>
</body>
</html>
