<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Welcome</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    const accessParam = params.get("access");
    const destination = "./new26mixes.html";

    if (accessParam === "dance") {
      localStorage.setItem("mb_access", "true");
      window.location.replace(destination);
    }

    if (localStorage.getItem("mb_access") === "true") {
      window.location.replace(destination);
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    form {
      margin-top: 20px;
    }

    .email-input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .cta {
      display: inline-block;
      width: 100%;
      padding: 12px 20px;
      background: #ffffff;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      border: none;
      cursor: pointer;
      box-sizing: border-box;
    }

    .cta:hover {
      opacity: 0.85;
    }

    .secondary-link {
      display: inline-block;
      margin-top: 16px;
      color: white;
      opacity: 0.85;
      text-decoration: underline;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Private Mix Library</h1>

    <p>
      This collection isn’t publicly listed.
      If you're looking for mixes for your dancers, I’ve got you covered.
    </p>

    <p>
      Enter your email and I’ll send you access.
    </p>

    <form action="https://formspree.io/f/mjgjwlnq" method="POST">
      <input
        class="email-input"
        type="email"
        name="email"
        placeholder="Enter your email"
        required
      >

      <input type="hidden" name="source" value="root-index-access-page">

      <button class="cta" type="submit">Get Access</button>
    </form>

    <a class="secondary-link" href="https://www.facebook.com/marcbeth" target="_blank" rel="noopener noreferrer">
      Prefer Facebook? Message me here.
    </a>
  </div>

  <script>
    window.goatcounter = {
      path: function () {
        return location.pathname;
      }
    };
  </script>

  <script data-goatcounter="https://jester8887.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script>
    document.querySelector('form').addEventListener('submit', function() {
      if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({
          path: 'email_submit',
          event: true
        });
      }
    });
  </script>
</body>
</html>
